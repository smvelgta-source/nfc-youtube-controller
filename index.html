<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YouTube Controller</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: #0f0f0f;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.logo {
  font-size: 48px;
  margin-bottom: 8px;
}

.title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}

.subtitle {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 48px;
  text-align: center;
}

/* Status indicator */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  padding: 8px 16px;
  margin-bottom: 40px;
  font-size: 12px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #6b7280;
  transition: background 0.3s;
}

.status-dot.online  { background: #16a34a; box-shadow: 0 0 6px #16a34a; }
.status-dot.playing { background: #ef4444; box-shadow: 0 0 6px #ef4444; animation: pulse 1.5s infinite; }
.status-dot.offline { background: #ef4444; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

/* Buttons */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 300px;
}

.btn {
  width: 100%;
  padding: 20px;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  -webkit-tap-highlight-color: transparent;
}

.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-start {
  background: linear-gradient(135deg, #16a34a, #15803d);
  color: #fff;
  box-shadow: 0 4px 20px rgba(22, 163, 74, 0.4);
}

.btn-stop {
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  color: #fff;
  box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
}

.btn-wake {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
}

/* Settings panel */
.settings {
  margin-top: 40px;
  width: 100%;
  max-width: 300px;
}

.settings-toggle {
  background: none;
  border: 1px solid #2a2a2a;
  color: #6b7280;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  width: 100%;
  -webkit-tap-highlight-color: transparent;
}

.settings-panel {
  display: none;
  margin-top: 12px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  padding: 16px;
}

.settings-panel.open { display: block; }

.field { margin-bottom: 12px; }
.field label { font-size: 11px; color: #6b7280; display: block; margin-bottom: 4px; }
.field input {
  width: 100%;
  background: #0f0f0f;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  padding: 9px 11px;
  outline: none;
  font-family: monospace;
}
.field input:focus { border-color: #3b82f6; }

.save-btn {
  width: 100%;
  padding: 10px;
  background: #185FA5;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 100;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { border-color: #16a34a; color: #16a34a; }
.toast.error   { border-color: #dc2626; color: #ef4444; }
</style>
</head>
<body>

<div class="logo">▶️</div>
<div class="title">YouTube Controller</div>
<div class="subtitle">NFC-triggered tablet controller</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Checking tablet...</span>
</div>

<div class="btn-group">
  <button class="btn btn-start" onclick="sendCommand('play')" id="startBtn">
    ▶ Start Playlist
  </button>
  <button class="btn btn-stop" onclick="sendCommand('stop')" id="stopBtn">
    ⏹ Stop
  </button>
  <button class="btn btn-wake" onclick="sendCommand('wake')">
    💡 Wake Screen
  </button>
</div>

<div class="settings">
  <button class="settings-toggle" onclick="toggleSettings()">⚙️ Settings</button>
  <div class="settings-panel" id="settingsPanel">
    <div class="field">
      <label>Tablet IP Address</label>
      <input type="text" id="tabletIp" placeholder="192.168.1.105"/>
    </div>
    <div class="field">
      <label>Automate Port</label>
      <input type="text" id="tabletPort" placeholder="8080"/>
    </div>
    <div class="field">
      <label>YouTube Playlist URL</label>
      <input type="text" id="playlistUrl" placeholder="https://youtube.com/playlist?list=..."/>
    </div>
    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Load saved settings ──────────────────────────────────
let cfg = {
  ip:       localStorage.getItem('tabletIp')   || '192.168.1.105',
  port:     localStorage.getItem('tabletPort') || '8080',
  playlist: localStorage.getItem('playlist')   || ''
};

document.getElementById('tabletIp').value   = cfg.ip;
document.getElementById('tabletPort').value = cfg.port;
document.getElementById('playlistUrl').value = cfg.playlist;

// ── Save settings ────────────────────────────────────────
function saveSettings() {
  cfg.ip       = document.getElementById('tabletIp').value.trim();
  cfg.port     = document.getElementById('tabletPort').value.trim();
  cfg.playlist = document.getElementById('playlistUrl').value.trim();
  localStorage.setItem('tabletIp',   cfg.ip);
  localStorage.setItem('tabletPort', cfg.port);
  localStorage.setItem('playlist',   cfg.playlist);
  toast('Settings saved!', 'success');
  toggleSettings();
  checkTablet();
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

// ── Send command to tablet ───────────────────────────────
async function sendCommand(cmd) {
  const url = 'http://' + cfg.ip + ':' + cfg.port + '/' + cmd;
  const btn = cmd === 'play' ? document.getElementById('startBtn') : null;

  if (btn) {
    btn.textContent = '⏳ Sending...';
    btn.disabled = true;
  }

  try {
    // Add playlist URL as query param for play command
    const fullUrl = cmd === 'play' && cfg.playlist
      ? url + '?playlist=' + encodeURIComponent(cfg.playlist)
      : url;

    const r = await fetch(fullUrl, {
      method:  'GET',
      mode:    'no-cors', // tablet won't send CORS headers
      signal:  AbortSignal.timeout(5000)
    });

    // no-cors means we can't read response but request was sent
    setStatus('playing', 'Playing on tablet');
    toast(cmd === 'play' ? '▶ Playlist started!' : cmd === 'stop' ? '⏹ Stopped' : '💡 Screen woken', 'success');

  } catch(e) {
    if (e.name === 'TimeoutError') {
      setStatus('offline', 'Tablet not responding');
      toast('Tablet not responding. Check IP or WiFi.', 'error');
    } else {
      // On iPhone, no-cors fetch may succeed silently
      setStatus('playing', cmd === 'play' ? 'Command sent' : 'Stopped');
      toast(cmd === 'play' ? '▶ Command sent!' : '⏹ Stop sent', 'success');
    }
  }

  if (btn) {
    btn.textContent = '▶ Start Playlist';
    btn.disabled = false;
  }
}

// ── Check tablet status ──────────────────────────────────
async function checkTablet() {
  setStatus('checking', 'Checking tablet...');
  try {
    await fetch('http://' + cfg.ip + ':' + cfg.port + '/ping', {
      mode: 'no-cors',
      signal: AbortSignal.timeout(3000)
    });
    setStatus('online', 'Tablet ready');
  } catch(e) {
    setStatus('offline', 'Tablet offline — check WiFi');
  }
}

function setStatus(state, text) {
  const dot  = document.getElementById('statusDot');
  const span = document.getElementById('statusText');
  dot.className  = 'status-dot ' + state;
  span.textContent = text;
}

// ── Toast ────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type||'') + ' show';
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Init ─────────────────────────────────────────────────
window.addEventListener('load', () => {
  checkTablet();
  // Auto-run if NFC opened this page with ?autoplay=1
  const params = new URLSearchParams(window.location.search);
  if (params.get('autoplay') === '1') {
    setTimeout(() => sendCommand('play'), 800);
  }
});
</script>

</body>
</html>
